appId: ch.telemersive.gateway
productName: Telemersive Gateway
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  identity: "Developer ID Application"
  notarize:
    teamId: ${APPLE_TEAM_ID}

win:
  target:
    - target: nsis
      arch:
        - x64
